projects:
  title: Projects
  intro: >
    Selected research and technical projects spanning bioinformatics,
    microbiology, bibliometrics, and machine learning applications in biology.
  assignments:
    - title: Predicting the Impact of Antibiotics on Bacteria Using AI
      tagline: >
        Project title: Predicting the Impact of Chemical Structures of Various
        Organic Compounds on Acinetobacter baumannii Activity Using Machine
        Learning. Supervised by Dr. Md Zakir Hossain at the Australian National
        University. Employed machine learning methods to predict inhibitory
        effects, extracted features from ChEMBL chemical structures, encoded
        atoms and bonds, and built graph-based models using Python on a remote
        Linux server with R for visualization.

    - title: Research on PVC Superphylum
      tagline: >
        Project title: Ecological Analysis of the PVC Superphylum in
        Environmental Microorganisms. Focused on Verrucomicrobia in marine
        sediments, integrating and annotating genes, assembling MAG fragments,
        and analyzing bacterial interaction networks using Linux tools, Python,
        and R.

    - title: Machine Learning in Microbiology
      tagline: >
        Project title: Investigating the Impact of Antibiotics on Environmental
        Microbiota Through Machine Learning. Analyzed 16S rRNA sequences from
        BioProject PRJNA576637, generated OTU tables, and developed predictive
        models for treatment effects, dominant bacterial classes, and stabilized
        community structure.

    - title: Microbial Wet Lab Experiments
      tagline: >
        Project title: Isolation and Identification of Marine Environmental
        Microorganisms. Worked as a research assistant at the National
        Microbiology Laboratory of Shandong University, isolating previously
        undiscovered microorganisms and identifying species through phylogenetic
        analysis, growth-condition testing, metabolic characterization, and
        antibiotic sensitivity assessment.

    - title: Bibliometric Analysis of Wine Flavor
      tagline: >
        Project title: Research on Wine Flavor: A Bibliometric and Visual
        Analysis (2003-2022). Reviewed around 4,000 articles, analyzed
        collaborations among authors, countries, and institutions, summarized
        research trends, predicted publication volume with a Markov chain model,
        and used Python, R, CiteSpace, and VOSviewer for analysis.

    - title: Applications of Machine Learning in Liver Cancer
      tagline: >
        Project title: Development and Validation of NAD(+) Metabolism-Related
        Gene Signature in Prognosis Prediction of Hepatocellular Carcinoma.
        Built a prognostic scoring model using TCGA and MSigDB resources,
        applied LASSO regression, and performed immune-function and drug
        sensitivity analyses in R.

    - title: Construction of Simple Bioinformatics Tools
      tagline: >
        Project title: Metabolic-Pathway-Presence-Heatmap (MPPH): Constructing
        Phylogenetic Trees Based on Metabolic Pathways. Developed a Python
        program that queries the KEGG API, gathers metabolic pathway data for
        bacterial taxa, and constructs UPGMA phylogenetic trees from pathway
        presence and absence patterns.

