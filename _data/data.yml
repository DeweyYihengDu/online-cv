career-profile:
  title: Research Profile
  summary: |
    My main area of research is the application of bioinformatics. The primary
    areas I am involved in include the isolation and identification of
    microorganisms, the annotation analysis of environmental microorganisms, the
    application of machine learning in microbiology, cancer and genomic
    expression, as well as the development and use of bioinformatics tools and
    bibliometrics to analyze multiple fields in biology.
